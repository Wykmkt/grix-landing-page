<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" width="1440" height="480">
  <rect width="1440" height="480" fill="#06060B"/>

  <!-- Header -->
  <text x="720" y="70" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="800" font-size="48" letter-spacing="-2">
    <tspan x="720" dy="0">Por que gestores</tspan>
    <tspan x="720" dy="58">escolhem a </tspan><tspan fill="#8C52FF">GRIX</tspan>
  </text>
  <text x="720" y="160" text-anchor="middle" fill="#A1A1AA" font-family="Inter" font-size="16">Não é mais uma ferramenta de analytics. É blindagem regulatória demonstrável.</text>

  <!-- Card 1: Explica, não reporta -->
  <rect x="120" y="210" width="380" height="240" rx="16" fill="#0C0C14" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="120" y1="210" x2="120" y2="450" stroke="#8C52FF" stroke-width="2.5"/>
  <text x="152" y="250" fill="#8C52FF" font-family="Inter" font-weight="600" font-size="12" letter-spacing="0.5">01</text>
  <text x="152" y="290" fill="#F5F5F7" font-family="Inter" font-weight="700" font-size="20">
    <tspan x="152" dy="0">Explica, não</tspan>
    <tspan x="152" dy="28">reporta</tspan>
  </text>
  <text x="152" y="360" fill="#A1A1AA" font-family="Inter" font-size="14">
    <tspan x="152" dy="0">Não mostramos métricas —</tspan>
    <tspan x="152" dy="22">explicamos causas e consequências.</tspan>
    <tspan x="152" dy="22">Parecer em uma página, não</tspan>
    <tspan x="152" dy="22">relatório de 40 slides.</tspan>
  </text>

  <!-- Card 2: Ex-cliente no comando -->
  <rect x="530" y="210" width="380" height="240" rx="16" fill="#0C0C14" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="562" y="250" fill="#8C52FF" font-family="Inter" font-weight="600" font-size="12" letter-spacing="0.5">02</text>
  <text x="562" y="290" fill="#F5F5F7" font-family="Inter" font-weight="700" font-size="20">
    <tspan x="562" dy="0">Ex-cliente</tspan>
    <tspan x="562" dy="28">no comando</tspan>
  </text>
  <text x="562" y="360" fill="#A1A1AA" font-family="Inter" font-size="14">
    <tspan x="562" dy="0">Nosso founder é CISO em</tspan>
    <tspan x="562" dy="22">exercício no Ministério Público.</tspan>
    <tspan x="562" dy="22">Ele já viveu a sua cadeira e</tspan>
    <tspan x="562" dy="22">fala a linguagem de quem assina.</tspan>
  </text>

  <!-- Card 3: ISO Badge -->
  <rect x="940" y="210" width="380" height="240" rx="16" fill="#0C0C14" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="1130" y="250" text-anchor="middle" fill="#8C52FF" font-family="Inter" font-weight="600" font-size="12" letter-spacing="0.5">03</text>
  <text x="1130" y="290" text-anchor="middle" font-size="40">🛡️</text>
  <text x="1130" y="340" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="800" font-size="18">ISO 27001</text>
  <text x="1130" y="365" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="800" font-size="18">27701 · 37001</text>
  <text x="1130" y="400" text-anchor="middle" fill="#A1A1AA" font-family="Inter" font-size="14">
    <tspan x="1130" dy="0">Certificações próprias em</tspan>
    <tspan x="1130" dy="22">Segurança, Privacidade</tspan>
    <tspan x="1130" dy="22">e Antissuborno</tspan>
  </text>
</svg>