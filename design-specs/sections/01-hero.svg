<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#8C52FF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#8C52FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8C52FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rimlight" cx="50%" cy="35%" r="25%">
      <stop offset="0%" stop-color="#8C52FF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8C52FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8C52FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C52FF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#06060B"/>

  <!-- Purple glow -->
  <ellipse cx="720" cy="350" rx="400" ry="300" fill="url(#glow)"/>

  <!-- Rim light halo -->
  <ellipse cx="720" cy="300" rx="200" ry="200" fill="url(#rimlight)"/>

  <!-- Portrait placeholder -->
  <rect x="445" y="150" width="550" height="600" rx="0" fill="#0C0C14" opacity="0.5"/>
  <text x="720" y="460" text-anchor="middle" fill="#636370" font-family="Inter" font-size="14">
    [Portrait — hero-portrait.jpg]
  </text>

  <!-- ISO Badge (left) -->
  <rect x="80" y="350" width="155" height="200" rx="16" fill="#0C0C14" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="157" y="385" text-anchor="middle" fill="#8C52FF" font-family="Inter" font-weight="600" font-size="12">2025</text>
  <text x="157" y="415" text-anchor="middle" font-size="24">🛡️</text>
  <text x="157" y="445" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="700" font-size="13">ISO 27001</text>
  <text x="157" y="463" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="700" font-size="13">27701 · 37001</text>
  <text x="157" y="495" text-anchor="middle" fill="#A1A1AA" font-family="Inter" font-size="10">Certificações próprias em</text>
  <text x="157" y="510" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="700" font-size="10">Segurança, Privacidade</text>
  <text x="157" y="525" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="700" font-size="10">e Antissuborno</text>

  <!-- Hero Title Line 1 -->
  <text x="720" y="380" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="300" font-size="72" letter-spacing="-3">Proteja a decisão.</text>

  <!-- Hero Title Line 2 -->
  <text x="720" y="470" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="800" font-size="72" letter-spacing="-3">Blinde sua gestão.</text>

  <!-- Gear icon -->
  <text x="1020" y="380" fill="#636370" font-size="28" opacity="0.5">⚙</text>

  <!-- Subtitle -->
  <text x="720" y="530" text-anchor="middle" fill="#A1A1AA" font-family="Inter" font-size="16">
    <tspan x="720" dy="0">Cibersegurança, Governança e Compliance para gestores que</tspan>
    <tspan x="720" dy="28" font-weight="500" fill="#F5F5F7">respondem pelo próprio CPF</tspan>
    <tspan fill="#A1A1AA" font-weight="400"> — com metodologia em 90 dias.</tspan>
  </text>

  <!-- CTA Primary -->
  <rect x="530" y="610" width="200" height="48" rx="24" fill="#8C52FF"/>
  <text x="630" y="640" text-anchor="middle" fill="#FFFFFF" font-family="Inter" font-weight="600" font-size="14">Diagnóstico executivo</text>

  <!-- CTA Arrow Circle -->
  <circle cx="745" cy="634" r="19" fill="#8C52FF"/>
  <line x1="738" y1="640" x2="752" y2="628" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="744" y1="628" x2="752" y2="628" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="752" y1="628" x2="752" y2="636" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- CTA Secondary -->
  <rect x="780" y="610" width="160" height="48" rx="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="860" y="640" text-anchor="middle" fill="#F5F5F7" font-family="Inter" font-weight="600" font-size="14">Como funciona</text>

  <!-- Trust line -->
  <text x="720" y="700" text-anchor="middle" fill="#636370" font-family="Inter" font-size="12">15+ anos protegendo decisões · 50+ projetos entregues · 3 certificações ISO</text>
</svg>